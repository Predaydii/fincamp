<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Literacy Camp - ธนาคารเงินในอากาศ</title>
<meta name="description" content="ระบบธนาคารดิจิทัล ค่ายคณิตศาสตร์การเงิน Financial Literacy Camp &quot;เงินอยู่ในอากาศ&quot;">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="coins" id="coins"></div>
<div class="toasts" id="toasts"></div>
<div class="wrap">
  <header class="hero">
    <h1>ธนาคารเงินในอากาศ</h1>
    <p>Financial Literacy Camp</p>
  </header>

  <section class="chart" id="chart"></section>

  <div class="adminlink"><a href="/admin.html">สำหรับแอดมิน</a></div>
</div>

<script>
const fmt = n => Math.round(n).toLocaleString("th-TH");

// floating currency symbols background
const symbols = ["$", "€", "¥", "£", "元", "₩", "Rp", "₿"];
const coinsEl = document.getElementById("coins");
for (let i = 0; i < 22; i++) {
  const s = document.createElement("span");
  s.className = "coin";
  s.textContent = symbols[i % symbols.length];
  s.style.left = (Math.random() * 100) + "vw";
  s.style.fontSize = (18 + Math.random() * 26) + "px";
  s.style.animationDuration = (12 + Math.random() * 18) + "s";
  s.style.animationDelay = (-Math.random() * 20) + "s";
  coinsEl.appendChild(s);
}

const chart = document.getElementById("chart");

// shrink the number to fit its column so long amounts never widen the column;
// if it would get too tiny, switch to compact Thai notation (e.g. 2 ล้าน)
const fmtCompact = new Intl.NumberFormat("th-TH", { notation: "compact", compactDisplay: "long", maximumFractionDigits: 1 });
function fitVal(col) {
  const val = col.querySelector(".val");
  const num = col.querySelector(".num");
  val.style.transform = "";
  let scale = Math.min(1, col.clientWidth / (val.scrollWidth || 1));
  if (scale < 0.65) {
    const bal = Number(col.dataset.bal || 0);
    num.textContent = fmtCompact.format(bal);
    num.title = fmt(bal);
    scale = Math.min(1, col.clientWidth / (val.scrollWidth || 1));
  }
  if (scale < 1) val.style.transform = `scale(${scale})`;
}
const shown = {};   // houseId -> displayed balance
let firstLoad = true;

function buildCol(h) {
  const col = document.createElement("div");
  col.className = "col";
  col.dataset.id = h.id;
  col.innerHTML = `
    <div class="val"><span class="num">0</span><span class="unit">รูปู</span></div>
    <div class="barwrap">
      <div class="vbar" style="--c:${h.color}"><span class="frame"></span><span class="rk"></span></div>
    </div>
    <div class="chip" style="--c:${h.color}">${h.symbol}</div>
    <div class="nm">${h.name.replace("บ้าน", "")}</div>`;
  return col;
}

function countUp(el, from, to, dur = 900) {
  const start = performance.now();
  function tick() {
    const t = Math.min(1, (performance.now() - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(from + (to - from) * eased);
    if (t < 1) setTimeout(tick, 16);
  }
  tick();
}

async function load() {
  const res = await fetch("/api/houses");
  const { houses } = await res.json();
  const sorted = [...houses].sort((a, b) => b.balance - a.balance);
  const max = Math.max(1, sorted[0].balance);

  // FLIP: record old x positions
  const oldPos = {};
  chart.querySelectorAll(".col").forEach(c => { oldPos[c.dataset.id] = c.getBoundingClientRect().left; });

  sorted.forEach((h, i) => {
    let col = chart.querySelector(`.col[data-id="${h.id}"]`);
    if (!col) {
      col = buildCol(h);
      col.style.animationDelay = (i * 0.09) + "s";
      chart.appendChild(col);
    } else {
      chart.appendChild(col); // reorder left -> right by rank
    }
    col.dataset.bal = h.balance;
    col.classList.toggle("first", i === 0 && h.balance > 0);
    col.querySelector(".rk").textContent = i + 1;

    // bar height: min 4% so a zero bar is still visible
    const pct = Math.max(4, (h.balance / max) * 100);
    const vbar = col.querySelector(".vbar");
    setTimeout(() => { vbar.style.height = pct + "%"; }, 60);

    const numEl = col.querySelector(".num");
    numEl.classList.toggle("neg", h.balance < 0);
    const prev = shown[h.id] ?? 0;
    if (prev !== h.balance) {
      countUp(numEl, prev, h.balance);
      if (!firstLoad) {
        col.classList.remove("flash");
        void col.offsetWidth;
        col.classList.add("flash");
      }
      shown[h.id] = h.balance;
      setTimeout(() => fitVal(col), 950); // after countUp settles
    }
    fitVal(col);
  });

  // FLIP: animate columns that swapped position
  if (!firstLoad) {
    chart.querySelectorAll(".col").forEach(c => {
      const oldLeft = oldPos[c.dataset.id];
      if (oldLeft == null) return;
      const delta = oldLeft - c.getBoundingClientRect().left;
      if (Math.abs(delta) > 2) {
        c.animate(
          [{ transform: `translateX(${delta}px)` }, { transform: "translateX(0)" }],
          { duration: 650, easing: "cubic-bezier(0.22, 1, 0.36, 1)" }
        );
      }
    });
  }
  firstLoad = false;
}
load();

// sound effects (Web Audio, synthesized — no files needed)
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
// browsers require a user gesture before audio can start
["click", "touchstart", "keydown"].forEach(ev =>
  document.addEventListener(ev, () => getCtx(), { once: true, passive: true })
);
function tone(ctx, freq, start, dur, type = "sine", vol = 0.12) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, ctx.currentTime + start);
  g.gain.setValueAtTime(0, ctx.currentTime + start);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + start + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
  o.connect(g).connect(ctx.destination);
  o.start(ctx.currentTime + start);
  o.stop(ctx.currentTime + start + dur + 0.05);
}
function playGain() {
  try {
    const ctx = getCtx();
    // sparkling coin: quick ascending chime
    tone(ctx, 1318.5, 0,    0.12, "triangle", 0.14); // E6
    tone(ctx, 1568.0, 0.07, 0.12, "triangle", 0.14); // G6
    tone(ctx, 2093.0, 0.14, 0.25, "triangle", 0.16); // C7
  } catch {}
}
function playLoss() {
  try {
    const ctx = getCtx();
    // descending "wah": money lost
    tone(ctx, 392.0, 0,    0.18, "sawtooth", 0.07); // G4
    tone(ctx, 311.1, 0.15, 0.18, "sawtooth", 0.07); // Eb4
    tone(ctx, 233.1, 0.30, 0.35, "sawtooth", 0.08); // Bb3
  } catch {}
}

// toast notifications
const toasts = document.getElementById("toasts");
function showToast(change, amount) {
  const t = document.createElement("div");
  t.className = "toast " + (amount > 0 ? "gain" : "loss");
  t.style.setProperty("--c", change.color);
  t.innerHTML = `
    <div class="t-chip">${change.symbol}</div>
    <div class="t-body">
      <div class="t-name">${change.name}</div>
      <div class="t-amt">${amount > 0 ? "ได้รับ +" : "เสีย −"}${fmt(Math.abs(amount))} รูปู</div>
    </div>
    <i class="t-timer"></i>`;
  toasts.prepend(t);
  while (toasts.children.length > 5) toasts.lastChild.remove();
  setTimeout(() => {
    t.classList.add("out");
    setTimeout(() => t.remove(), 500);
  }, 4500);
}

// realtime via Server-Sent Events (+ slow polling as safety net)
const es = new EventSource("/api/stream");
es.onmessage = e => {
  if (e.data === "connected") return;
  if (e.data === "update") { load(); return; }
  try {
    const msg = JSON.parse(e.data);
    if (msg.type === "update") {
      load();
      (msg.changes || []).forEach((c, i) => setTimeout(() => showToast(c, c.amount ?? msg.amount), i * 250));
      if (msg.changes && msg.changes.length) (msg.amount > 0 ? playGain : playLoss)();
    }
  } catch { load(); }
};
es.onerror = () => {}; // EventSource auto-reconnects
setInterval(load, 30000);
</script>
</body>
</html>
